name: digest

# Daily KST 09:00 = UTC 00:00. GitHub Actions cron is best-effort;
# tens-of-minutes drift is normal — the 26h WINDOW_HOURS absorbs that.
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run? true = console only, false = actually send"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime deps
        run: pip install -e .

      - name: Run digest
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          WINDOW_HOURS: "26"
          # workflow_dispatch lets a human toggle dry_run; schedule always dry-runs.
          DRY_RUN: ${{ inputs.dry_run == false && 'false' || 'true' }}
          DELIVERY: ""
        run: python -m ai_news_digest
